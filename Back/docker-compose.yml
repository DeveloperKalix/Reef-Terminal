services:
  panel-reef-media:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: Panel-Reef-Media
    restart: unless-stopped
    ports:
      - "127.0.0.1:6002:6000"   # Only accessible from localhost (nginx proxies externally)
    environment:
      # Points to the Docker secret mount — value is a path, not the secret itself
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase_credentials
    secrets:
      - firebase_credentials
    # Optional: override port via env if needed
    # command: ["jac", "start", "main.jac", "--no_client", "-p", "6000"]

secrets:
  firebase_credentials:
    file: ./reef-media-trust-panel-firebase-adminsdk-fbsvc-39a64f5023.json
