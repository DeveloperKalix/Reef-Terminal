[project]
name = "reef-media-panel-frontend"
version = "0.1.0"
description = "Reef Media Trust & Safety Panel - Frontend"
entry = "main.jac"

[serve]
port = 6000

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
recharts = "^3.7.0"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[plugins.client]
enabled = true
typescript = true

[plugins.client.paths]
"@styles/*" = "./styles/*"
"@assets/*" = "./assets/*"
"@components/*" = "./components/*"
"@pages/*" = "./pages/*"
"@lib/*" = "./lib/*"

[scripts]
dev = "jac start main.jac --dev"
build = "jac build"
start = "jac start main.jac"
